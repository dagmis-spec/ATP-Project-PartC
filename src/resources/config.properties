# How many client requests the servers may handle in parallel.
threadPoolSize=10

# Maze creation algorithm: EmptyMazeGenerator, SimpleMazeGenerator, or MyMazeGenerator.
mazeGeneratingAlgorithm=MyMazeGenerator

# Maze solving algorithm: BreadthFirstSearch, DepthFirstSearch, or BestFirstSearch.
mazeSearchingAlgorithm=BestFirstSearch
